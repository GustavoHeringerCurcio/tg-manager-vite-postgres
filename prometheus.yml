global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: "botflix"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["app:3001"]
        labels:
          service: "telegram-botflix"
