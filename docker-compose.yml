services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botflix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-botflix}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://botflix:change-me@db:5432/botflix?schema=public&pool_timeout=10}
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    environment:
      NODE_ENV: production
      APP_PORT: ${APP_PORT:-3000}
      DOMAIN: ${DOMAIN:-botflix.example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin-botflix}
      LIVEPIX_CLIENT_ID: ${LIVEPIX_CLIENT_ID:-change-me}
      LIVEPIX_CLIENT_SECRET: ${LIVEPIX_CLIENT_SECRET:-change-me}
      MAX_PIX_GENERATIONS: ${MAX_PIX_GENERATIONS:-5}
      INTERACTION_RETENTION_DAYS: ${INTERACTION_RETENTION_DAYS:-90}
      LOG_PAYLOADS: ${LOG_PAYLOADS:-false}
      WORKER_COUNT: ${WORKER_COUNT:-2}
      PAYMENT_POLL_WINDOW_MINUTES: ${PAYMENT_POLL_WINDOW_MINUTES:-30}
      DATABASE_URL: ${DATABASE_URL:-postgresql://botflix:change-me@db:5432/botflix?schema=public&pool_timeout=10}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.APP_PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
